<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BP_ORTFOLIO — Projeler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="icon" type="image/png" href="fav.icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,200;0,300;1,200;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* ── DEĞİŞKENLER & RESET ── */
    :root {
      --bg:     #404040db;
      --gold:   #ff0000;
      --white:  #fbff00;
      --dim:    rgb(255, 166, 0);
      --grid:   rgba(123, 0, 0, 0.059);
      --border: rgb(182, 124, 0);
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; cursor:none !important; }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Space Mono', monospace;
      width: 100vw; height: 100vh;
      overflow: hidden; cursor: none;
      user-select: none;
    }

    /* ── CAD ARAYÜZÜ ── */
    #cad-h, #cad-v {
      position: fixed; left: 0; top: 0;
      background: rgba(255, 255, 255, 0.482);
      pointer-events: none; z-index: 9997;
    }
    #cad-h { width: 100vw; height: 1px; }
    #cad-v { width: 1px; height: 100vh; }
    
    #cursor { position: fixed; left: 0; top: 0; pointer-events: none; z-index: 9999; }
    #cursor .cad-sq {
      position: absolute; width: 9px; height: 9px;
      border: 1px solid rgba(255, 255, 255, 0.9);
      transform: translate(-50%, -50%);
      transition: width 0.13s, height 0.13s;
    }
    #cursor.hover .cad-sq { width: 16px; height: 16px; border-color: rgb(253, 253, 253); }
    #cursor.grabbing .cad-sq { width: 5px; height: 5px; background: var(--gold); border-color: var(--gold); }

    #grid-bg {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image: linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 64px 64px;
    }
    #scanline {
      position: fixed; top: -2px; left: 0; width: 100%; height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.07), transparent);
      animation: scan 14s linear infinite; pointer-events: none; z-index: 1;
    }
    @keyframes scan { 0%{ top:-2px } 100%{ top:100vh } }

    /* ── GERİ DÖN BUTONU ── */
    #btn-back {
      position: fixed; top: 22px; left: 22px; z-index: 10;
      background: transparent; border: none;
      color: rgba(255, 255, 255, 0.5); font-family: 'Space Mono', monospace;
      font-size: 10px; letter-spacing: 0.3em; text-decoration: none; text-transform: uppercase;
      transition: color 0.3s;
    }
    #btn-back:hover { color: var(--gold); }

    /* ── MERKEZ DROP KUTUSU ── */
    #drop-zone {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 120px; height: 120px;
      border: 1px dashed rgba(255, 255, 255, 0.3);
      display: flex; align-items: center; justify-content: center;
      z-index: 5; transition: border-color 0.3s, background 0.3s, transform 0.3s;
    }
    #drop-zone span {
      font-size: 24px; color: rgba(255, 255, 255, 0.3); font-weight: 200;
      transition: color 0.3s, transform 0.3s;
    }
    #drop-zone.active {
      border-color: var(--gold); background: rgba(196,163,90,0.05); transform: translate(-50%, -50%) scale(1.1);
    }
    #drop-zone.active span { color: var(--gold); transform: rotate(90deg); }

    #instruction {
      position: fixed; top: calc(50% + 80px); left: 50%; transform: translateX(-50%);
      font-size: 8.5px; letter-spacing: 0.45em; color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase; z-index: 3; pointer-events: none;
      animation: breathe 1s ease-in-out infinite; text-align: center;
    }
    @keyframes breathe { 0%,100%{ opacity:.35 } 50%{ opacity:1 } }

    /* ── UÇAN PROJE KAPAKLARI ── */
    .proj-cover {
      position: fixed; z-index: 10;
      width: 160px; height: 220px;
      background-size: cover; background-position: center;
      border: 1px solid var(--border);
      filter: grayscale(100%) opacity(0.8);
      transition: filter 0.3s;
      touch-action: none; 
    }
    .proj-cover:hover, .proj-cover.dragging { filter: grayscale(0%) opacity(1); border-color: var(--gold); }
    
    .proj-title-bar {
      position: absolute; bottom: 0; left: 0; width: 100%;
      background: rgba(0,0,0,0.8); padding: 8px;
      font-size: 8px; letter-spacing: 0.2em; color: var(--white); text-transform: uppercase;
      text-align: center; border-top: 1px solid var(--border);
    }

    /* ── DETAY PANELİ (Modal) ── */
    .panel {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(7, 7, 7, 0.85); display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.55s ease;
    }
    .panel.open { opacity: 1; pointer-events: all; }
    
    .panel-inner {
      width: min(820px, 90vw); padding: 60px;
      border: 1px solid rgba(196,163,90,0.14); position: relative;
      transform: translateY(20px); transition: transform 0.55s ease;
      background: var(--bg); display: flex; gap: 40px;
    }
    .panel.open .panel-inner { transform: translateY(0); }
    
    .panel-inner::before { content:''; position:absolute; top:-1px; left:-1px; width:28px; height:28px; border-top: 1px solid var(--white); border-left: 1px solid var(--gold); }
    .panel-inner::after { content:''; position:absolute; bottom:-1px; right:-1px; width:28px; height:28px; border-bottom: 1px solid var(--white); border-right: 1px solid var(--gold); }

    /* ── YENİLENEN BUTONLU SLIDER ALANI ── */
    .slider-container {
      position: relative;
      width: 300px; height: 400px;
      border: 1px solid var(--border);
      flex-shrink: 0; overflow: hidden;
      background: #111;
    }

    #slider-img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      filter: grayscale(40%);
      transition: filter 0.3s;
    }
    .slider-container:hover #slider-img { filter: grayscale(0%); }

    /* Mimari Temaya Uygun İleri/Geri Butonları */
    .slider-btn {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(0, 0, 0, 0.75); color: var(--gold);
      border: 1px solid var(--border);
      font-family: 'Space Mono', monospace; font-size: 11px;
      padding: 12px 8px; cursor: pointer; z-index: 10;
      transition: all 0.2s ease;
    }
    .slider-btn:hover {
      background: var(--gold); color: #000; border-color: var(--gold);
    }
    .prev-btn { left: 0; border-left: none; }
    .next-btn { right: 0; border-right: none; }

    /* Sağ Alt Köşe Sayacı */
    .slider-counter {
      position: absolute; bottom: 12px; right: 12px;
      background: rgba(0, 0, 0, 0.8); color: var(--white);
      font-size: 9px; padding: 4px 8px; letter-spacing: 0.1em;
      border: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 10; pointer-events: none;
    }

    /* ── İÇERİK KISMI ── */
    .panel-content { flex: 1; display: flex; flex-direction: column; justify-content: center; }
    .panel-title { font-family: 'Cormorant Garamond', serif; font-weight: 200; font-style: italic; font-size: 2.5rem; color: var(--white); margin-bottom: 15px; }
    .panel-title em { color: var(--gold); font-style:italic; }
    .panel-desc { font-size: 10.5px; line-height: 2.2; color: var(--dim); letter-spacing: 0.06em; margin-bottom: 20px; }
    
    .close-btn {
      position: absolute; top: 22px; right: 22px; z-index: 50;
      background: none; border: none; font-family: 'Space Mono', monospace; font-size: 8.5px; letter-spacing: 0.3em; color: rgba(255, 0, 0, 0.778); text-transform: uppercase; transition: color 0.3s;
    }
    .close-btn:hover { color: var(--gold); }
    .divider { width: 38px; height: 1px; background: rgba(196,163,90,0.28); margin: 20px 0; }

    footer {
    position: fixed;
    bottom: 20px;
    left: 20px;
    z-index: 9998; /* Katman sırasını öne al */
}

#panel-contact {
    color: rgba(255, 0, 0, 0.718);
    font-size: 10px;
    text-decoration: none;
    font-family: 'Space Mono', monospace;
    pointer-events: auto; /* Tıklanabilirliği zorunlu kıl */
    transition: color 0.3s;
}

#panel-contact:hover {
    color: var(--gold);
}
  </style>
</head>
<body>

  <div id="cad-h"></div> <div id="cad-v"></div> <div id="cursor"><div class="cad-sq"></div></div>
  <div id="grid-bg"></div> <div id="scanline"></div>
  
  <a href="index.html" id="btn-back">[ GO BACK ]</a>

  <div id="drop-zone"><span>+</span></div>
  <p id="instruction">HOLD AND DRAG A PROJECT TO THE CENTER</p>

  <div class="proj-cover" id="proj-1" data-id="1" style="background-image: url('portf.png');">
    <div class="proj-title-bar">MTG</div>
  </div>
  <div class="proj-cover" id="proj-2" data-id="2" style="background-image: url('emsall.png');">
    <div class="proj-title-bar">EMSAL</div>
  </div>
  <div class="proj-cover" id="proj-3" data-id="3" style="background-image: url('mp111.png');">
    <div class="proj-title-bar">MP1</div>
  </div>
  <div class="proj-cover" id="proj-4" data-id="4" style="background-image: url('ECO\ -\ ÇATI.png');">
    <div class="proj-title-bar">ECO - AFİŞ</div>
  </div>
  <div class="proj-cover" id="proj-5" data-id="5" style="background-image: url('VAWES.png');">
    <div class="proj-title-bar">RHINO</div>
  </div>
  <div class="proj-cover" id="proj-6" data-id="6" style="background-image: url('sketcup.png');">
    <div class="proj-title-bar">SketchUp</div>
  </div>
  <div class="proj-cover" id="proj-7" data-id="7" style="background-image: url('SANAT\ VE\ MİMARLIK\ TARİHİ.png');">
    <div class="proj-title-bar">Sanat ve Mimarlık</div>
  </div>
  <div class="proj-cover" id="proj-8" data-id="8" style="background-image: url('MİMARİ\ TASARIMLARIN\ İNSAN\ PSKİKOLOJİSİNE\ ve\ sosyalleşmeye\ Etkisi.png');">
    <div class="proj-title-bar">Mimari Tasarım</div>
  </div>
  <div class="proj-cover" id="proj-9" data-id="9" style="background-image: url('20241301069_BerkayPirinç_1.jpg');">
    <div class="proj-title-bar">Çevresel Tasarım</div>
  </div>
  <div class="proj-cover" id="proj-10" data-id="10" style="background-image: url('2.png');">
    <div class="proj-title-bar">Others</div>
  </div>

  <div class="panel" id="detail-panel">
    <div class="panel-inner">
      <button class="close-btn" id="close-detail">[ ESC / Close ]</button>
      
      <div class="slider-container">
        <button class="slider-btn prev-btn" onclick="changeSlide(-1)">[ &lt; ]</button>
        <img src="" alt="Proje Görseli" id="slider-img">
        <button class="slider-btn next-btn" onclick="changeSlide(1)">[ &gt; ]</button>
        <div class="slider-counter" id="slider-counter">1 / 1</div>
      </div>

      <div class="panel-content">
        <h2 class="panel-title" id="detail-title">Proje Adı</h2>
        <div class="divider"></div>
        <p class="panel-desc" id="detail-desc">Proje açıklaması buraya gelecek.</p>
        <span style="font-size: 8.5px; color: rgba(196,163,90,0.5); letter-spacing: 0.2em;" id="detail-year">Yıl: 202X</span>
      </div>
    </div>
  </div>


  <footer>
    <a href="index.html" id="panel-contact">[© 2026 Berkay Pirinç]</a>
</footer>

  <script>
    // ── CAD İMLEÇ TAKİBİ ──
    const cursor = document.getElementById('cursor');
    const cadH = document.getElementById('cad-h');
    const cadV = document.getElementById('cad-v');

    document.addEventListener('mousemove', e => {
      cursor.style.transform = `translate(${e.clientX}px,${e.clientY}px)`;
      cadH.style.transform   = `translateY(${e.clientY}px)`;
      cadV.style.transform   = `translateX(${e.clientX}px)`;
    });

    // ── YEREL GÖRSELLER İÇİN VERİ YAPISI ──
    
    const projectData = {
      "1": { title: "MTG", desc: "Mimari Tasarıma Giriş portfolyosu.", year: "2024", images: ["portf.png", "mtg3.png", "mtg2.png", "mtg33.png", "mtgg.png"] },
      "2": { title: "EMSAL", desc: "Emsal dersi hakkında kısa özet.", year: "2026", images: ["emsall.png", "SOU.png", "ser.png"] },
      "3": { title: "MP1", desc: "Konut ve kreş birleşimi.", year: "2025", images: ["mp111.png", "mp222.png", "mp333.png", "2.png"] },
      "4": { title: "ECO AFİŞ", desc: "Sürdürülebilir yaklaşımlar.", year: "2025", images: ["ECO - ÇATI.png", "ecooo.png"] },
      "5": { title: "RHINO", desc: "Modelleme çalışması.", year: "2025", images: ["VAWES.png"] },
      "6": { title: "SketchUp", desc: "3D Modelleme çalışması.", year: "2025", images: ["sketcup.png"] },
      "7": { title: "Sanat ve Mimarlık", desc: "Tarihsel analiz.", year: "2025", images: ["SANAT VE MİMARLIK TARİHİ.png"] },
      "8": { title: "Mimari Tasarım", desc: "Psikoloji odaklı tasarım.", year: "2025", images: ["MİMARİ TASARIMLARIN İNSAN PSKİKOLOJİSİNE ve sosyalleşmeye Etkisi.png"] },
      "9": { title: "Çevresel Tasarım", desc: "Kentsel bağlam analizi.", year: "2025", images: ["20241301069_BerkayPirinç_1.jpg"] },
      "10": { title: "Others", desc: "Diğer çalışmalar.", year: "2025", images: ["BRUTAL.png", "raporr.png", "fav.icon.png", "Sagamore Kuzey Kulübesi.png", "SANAYİ.png"] }
    };

    // ── FİZİKSEL ÇARPIŞMA VE SÜRÜKLEME ──
    const covers = Array.from(document.querySelectorAll('.proj-cover'));
    const dropZone = document.getElementById('drop-zone');
    const states = [];
    let activeDrag = null;
    let dragOffsetX = 0;
    let dragOffsetY = 0;

    covers.forEach((cover, i) => {
      const w = 160, h = 220, margin = 40;
      const speed = 0.3 + Math.random() * 0.2;
      const angle = Math.random() * Math.PI * 2;
      
      const s = {
        x: margin + Math.random() * (window.innerWidth - w - margin * 2),
        y: margin + Math.random() * (window.innerHeight - h - margin * 2),
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        isHovered: false,
        isDragging: false,
        el: cover
      };
      
      states.push(s);
      cover.style.left = s.x + 'px';
      cover.style.top  = s.y + 'px';

      cover.addEventListener('mouseenter', () => { s.isHovered = true; cursor.classList.add('hover'); });
      cover.addEventListener('mouseleave', () => { s.isHovered = false; cursor.classList.remove('hover'); });
      
      cover.addEventListener('pointerdown', (e) => {
        activeDrag = s;
        s.isDragging = true;
        cover.classList.add('dragging');
        cursor.classList.add('grabbing');
        
        const rect = cover.getBoundingClientRect();
        dragOffsetX = e.clientX - rect.left;
        dragOffsetY = e.clientY - rect.top;
        
        s.vx = 0; s.vy = 0;
      });
    });

    window.addEventListener('pointermove', (e) => {
      if (activeDrag) {
        activeDrag.x = e.clientX - dragOffsetX;
        activeDrag.y = e.clientY - dragOffsetY;
        
        const coverRect = activeDrag.el.getBoundingClientRect();
        const dropRect = dropZone.getBoundingClientRect();
        
        const isColliding = !(
          coverRect.right < dropRect.left || 
          coverRect.left > dropRect.right || 
          coverRect.bottom < dropRect.top || 
          coverRect.top > dropRect.bottom
        );

        if (isColliding) {
          dropZone.classList.add('active');
        } else {
          dropZone.classList.remove('active');
        }
      }
    });

    window.addEventListener('pointerup', () => {
      if (activeDrag) {
        activeDrag.isDragging = false;
        activeDrag.el.classList.remove('dragging');
        cursor.classList.remove('grabbing');
        
        if (dropZone.classList.contains('active')) {
          openDetail(activeDrag.el.dataset.id);
          dropZone.classList.remove('active');
          
          activeDrag.vx = (Math.random() - 0.5) * 1.5;
          activeDrag.vy = (Math.random() - 0.5) * 1.5;
        } else {
          activeDrag.vx = (Math.random() - 0.5);
          activeDrag.vy = (Math.random() - 0.5);
        }
        activeDrag = null;
      }
    });

    function animate() {
      const W = window.innerWidth;
      const H = window.innerHeight;
      const w = 160, h = 220;

      states.forEach((s) => {
        if (!s.isDragging) {
          if (s.isHovered) {
            s.vx *= 0.95; s.vy *= 0.95; 
          } else {
            if(Math.abs(s.vx) < 0.1 && Math.abs(s.vy) < 0.1) {
                s.vx += (Math.random() - 0.5) * 0.1;
                s.vy += (Math.random() - 0.5) * 0.1;
            }
          }

          s.x += s.vx;
          s.y += s.vy;

          if (s.x <= 0)      { s.x = 0;      s.vx =  Math.abs(s.vx); }
          if (s.x >= W - w)  { s.x = W - w;  s.vx = -Math.abs(s.vx); }
          if (s.y <= 0)      { s.y = 0;      s.vy =  Math.abs(s.vy); }
          if (s.y >= H - h)  { s.y = H - h;  s.vy = -Math.abs(s.vy); }
        }
        
        s.el.style.left = s.x + 'px';
        s.el.style.top  = s.y + 'px';
      });

      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);

    // ── SLIDER SİSTEMİ ──
    const detailPanel = document.getElementById('detail-panel');
    const closeBtn = document.getElementById('close-detail');
    const sliderImg = document.getElementById('slider-img');
    const sliderCounter = document.getElementById('slider-counter');

    let activeImages = [];
    let currentImgIndex = 0;

    function openDetail(id) {
      const data = projectData[id];
      if(!data) return;
      
      document.getElementById('detail-title').innerHTML = data.title;
      document.getElementById('detail-desc').innerText = data.desc;
      document.getElementById('detail-year').innerText = "Yıl: " + data.year;
      
      activeImages = data.images;
      currentImgIndex = 0;
      
      updateSliderUI();
      detailPanel.classList.add('open');
    }

    function changeSlide(direction) {
      currentImgIndex += direction;
      if (currentImgIndex >= activeImages.length) currentImgIndex = 0;
      else if (currentImgIndex < 0) currentImgIndex = activeImages.length - 1;
      updateSliderUI();
    }

    function updateSliderUI() {
      if (activeImages.length > 0) {
        sliderImg.src = activeImages[currentImgIndex];
        sliderCounter.innerText = `${currentImgIndex + 1} / ${activeImages.length}`;
      }
    }

    closeBtn.addEventListener('click', () => detailPanel.classList.remove('open'));
    document.addEventListener('keydown', e => { if (e.key === 'Escape') detailPanel.classList.remove('open'); });
  </script>
</body>
</html>
